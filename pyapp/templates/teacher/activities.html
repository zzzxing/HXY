{% extends 'base/layout.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3"><h4>活动配置中心</h4><a href="/teacher/dashboard" class="btn btn-outline-secondary btn-sm">返回驾驶舱</a></div>
<form method="post" action="/teacher/activities" class="v2-card mb-3">
  <h6>创建活动</h6>
  <input class="form-control mb-2" name="title" placeholder="活动标题" required />
  <input class="form-control mb-2" name="theme" placeholder="主题" />
  <textarea class="form-control mb-2" name="description" placeholder="简介"></textarea>
  <button class="btn btn-primary">创建</button>
</form>
<div class="v2-card">
  <h6>我的活动</h6>
  <ul>{% for a in activities %}<li>{{ a.title }} [{{ a.status }}] <a href="/teacher/activities/{{ a.id }}/edit">编辑</a> <a href="/teacher/activities/{{ a.id }}/students">学情</a></li>{% else %}<li>暂无活动</li>{% endfor %}</ul>
</div>
{% endblock %}
