<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>黄小游 V2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/v2.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/dashboard">黄小游 V2</a>
    {% if user %}
    <div class="d-flex align-items-center gap-2">
      <span class="text-muted small">{{ user.name }} ({{ user.role }})</span>
      <a href="/logout" class="btn btn-sm btn-outline-secondary">退出</a>
    </div>
    {% endif %}
  </div>
</nav>
<div class="container py-3 page-space">
  {% block content %}{% endblock %}
</div>
{% if user and user.role == 'student' %}
<div class="bottom-nav">
  <a class="{% if request.url.path.startswith('/student/home') %}active{% endif %}" href="/student/home">首页</a>
  <a class="{% if request.url.path.startswith('/student/map') %}active{% endif %}" href="/student/map">地图</a>
  <a class="{% if request.url.path.startswith('/student/tasks') %}active{% endif %}" href="/student/tasks">任务</a>
  <a class="{% if request.url.path.startswith('/student/backpack') %}active{% endif %}" href="/student/backpack">背包</a>
  <a class="{% if request.url.path.startswith('/student/me') %}active{% endif %}" href="/student/me">我的</a>
</div>
{% endif %}
</body>
</html>
