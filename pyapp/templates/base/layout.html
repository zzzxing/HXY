<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>黄小游</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg bg-white border-bottom mb-3">
  <div class="container">
    <a class="navbar-brand" href="/dashboard">黄小游</a>
    {% if user %}
    <div class="d-flex gap-3 align-items-center">
      <span class="text-muted">{{ user.name }} ({{ user.role }})</span>
      <a href="/logout" class="btn btn-sm btn-outline-secondary">退出</a>
    </div>
    {% endif %}
  </div>
</nav>
<div class="container pb-4">
  {% block content %}{% endblock %}
</div>
</body>
</html>
