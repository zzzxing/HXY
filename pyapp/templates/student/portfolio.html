{% extends 'base/layout.html' %}
{% block content %}
<div class="v2-card mb-3"><h5>学习档案</h5><p>{{ portfolio.summary }}</p><p>教师评分：{{ portfolio.teacher_score or '待评分' }}</p><p>教师评语：{{ portfolio.teacher_comment or '待评价' }}</p></div>
<div class="v2-card">{% for i in items %}<div class="border rounded p-2 mb-2"><strong>{{ i.item_type }}</strong><pre class="mb-0">{{ i.content }}</pre></div>{% else %}<p>暂无明细</p>{% endfor %}</div>
{% endblock %}
